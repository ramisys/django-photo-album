{% extends 'base.html' %}
{% block title %}Delete album | Photo Album{% endblock %}
{% block content %}
<section class="panel form-shell">
    <p class="eyebrow">Danger zone</p>
    <h1>Delete album</h1>
    <p>Deleting <strong>{{ object.title }}</strong> will remove its photos as well. This cannot be undone.</p>
    <form method="post" class="form-panel">
        {% csrf_token %}
        <button class="button button-danger" type="submit">Delete album</button>
        <a class="button" href="{% url 'album-detail' object.pk %}">Cancel</a>
    </form>
</section>
{% endblock %}
