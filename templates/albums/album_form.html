{% extends 'base.html' %}
{% block title %}Album form | Photo Album{% endblock %}
{% block content %}
<section class="panel form-shell">
    <p class="eyebrow">Album</p>
    <h1>{% if object %}Edit album{% else %}Create album{% endif %}</h1>
    <form method="post" class="form-panel">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>
            Title
            {{ form.title }}
        </label>
        <label>
            Description
            {{ form.description }}
        </label>
        <button class="button button-dark" type="submit">Save album</button>
    </form>
</section>
{% endblock %}
